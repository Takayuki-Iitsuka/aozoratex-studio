[meta]
; フォント名の初期値は global_settings.default.ini の font_family で一元管理します。
; このファイルはデバイスごとの本文サイズ（font_size）とレイアウト値のみを管理します。
; 1行あたりの文字数目安は font_size と余白から自動計算されます。

