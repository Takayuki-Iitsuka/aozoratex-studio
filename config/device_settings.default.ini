width_mm = 90.0
height_mm = 195.0
margin_top_mm = 3.0
margin_bottom_mm = 3.0
margin_left_mm = 3.0
margin_right_mm = 3.0
mode = single_column
show_page_number = false
orientation = portrait
line_gap_ratio = 0.35
line_leading_ratio = 1.35
