[meta]
; フォント名の初期値は global_settings.default.ini の font_family で一元管理します。
; このファイルはデバイスごとの本文サイズ（font_size）とレイアウト値のみを管理します。
; orientation は smart / tablet で portrait | landscape を指定できます。
; 1行あたりの文字数目安は font_size と余白から自動計算されます。
; JIS調整値:
;   line_gap_ratio      : 行間係数 k（既定0.5）
;   line_leading_ratio  : 字送り係数（既定1.5）
;   character_spacing_zw: 字間（zw単位, 既定0.0）
; カスタマイズは device_settings.custom.ini への上書きを推奨します。

[smart]
font_size = 10.5
width_mm = 62.0
height_mm = 134.0
margin_top_mm = 4.0
margin_bottom_mm = 4.0
margin_left_mm = 4.0
margin_right_mm = 4.0
mode = single_column
show_page_number = false
orientation = portrait
line_gap_ratio = 0.5
line_leading_ratio = 1.5
character_spacing_zw = 0.0

[tablet]
font_size = 13.5
width_mm = 158.0
height_mm = 227.0
margin_top_mm = 7.0
margin_bottom_mm = 7.0
margin_left_mm = 7.0
margin_right_mm = 7.0
mode = single_column
show_page_number = true
orientation = portrait
line_gap_ratio = 0.5
line_leading_ratio = 1.5
character_spacing_zw = 0.0

[pc]
font_size = 13.5
width_mm = 210.0
height_mm = 297.0
margin_top_mm = 20.0
margin_bottom_mm = 20.0
margin_left_mm = 20.0
margin_right_mm = 20.0
mode = single_column
show_page_number = true
orientation = portrait
line_gap_ratio = 0.5
line_leading_ratio = 1.5
character_spacing_zw = 0.0
