[PDF]
# ========================================
# デフォルトカラーモード設定
# ========================================
# PDFの背景色と文字色を設定します。
# - light: 背景=白, 文字=黒
# - dark: 背景=黒, 文字=白
# - intermediate: 背景=薄いグレー, 文字=濃いグレー
color_mode = light  ; light | dark | intermediate
background_color_light = #FFFFFF  ; ライトモードの背景色
text_color_light = #000000  ; ライトモードの文字色
background_color_dark = #000000  ; ダークモードの背景色
text_color_dark = #FFFFFF  ; ダークモードの文字色
background_color_intermediate = #D3D3D3  ; 中間モードの背景色
text_color_intermediate = #4F4F4F  ; 中間モードの文字色

# ========================================
# デフォルトフォント・レイアウト設定
# ========================================
# PCデバイス（A4）用のデフォルト値。
# 注: 游明朝は視認性が高い（特に小型デバイスで細線が飛びにくい）。
#     インストールされていない場合は IPAMincho にフォールバック。
font = Yu Mincho  ; 推奨: 游明朝（Windows10/11+）。インストール無い場合は IPAMincho
font_size = 11pt
characters_per_line = 29  ; iPhone11相当の初期値

# ========================================
# JIS X 4051 準拠レイアウト設定
# ========================================
# line_spacing は aozoratex.py では \linespread に渡すが、
# 実際の行送りは \setlength{\baselineskip}{1.7\zh} で JIS 準拠に自動設定されます。
# そのため line_spacing は「linespread 微調整用」として使用します。
# JIS X 4051 基準値：
#   行送り F = 字高さ S × 1.7 （ルビなし行）
#   ルビサイズ R = S × 0.5  （JIS X 4051 §6.2）
#   ルビ間隔   = S × 0.1  （親文字とルビの最小空き）
#   字間（和字間） = 0     （ベタ組み）
#   字間（和欧文間）= 0.25zw（四分アキ）
# ルビあり行・なし行で行間が揃うように、\baselineskip を相対単位（zh）で制御します。
line_spacing = 1.0  ; \linespread の微調整値（通常は 1.0 でよい。行送りは baselineskip で制御）

# ========================================
# iPhone 11 用設定
# ========================================
# 画面寸法: 65mm x 140mm（発光デバイスのため情動性を考慮した余白設定）
# ページ数: 非表示（スマホは文字表示優先）
# 余白: 上下左右 5mm
[PDF_iphone]
font = Yu Mincho  ; 推奨: 游明朝（細線が飛びにくい）
font_size = 11pt  ; 小型デバイスで読みやすいサイズ
characters_per_line = 33
line_spacing = 1.0  ; baselineskip（1.7zh）で行送りを制御。このパラメータは微調整用
iphone_width = 65    ; iPhone 11 画面幅: 64.5mm
iphone_height = 140  ; iPhone 11 画面高さ: 139.6mm

# ========================================
# Android 用設定（現代型・9:20アスペクト比）
# ========================================
# 画面寸法: 70mm x 155.5mm（最新Pixel等の標準サイズ）
# ページ数: 非表示（スマホは文字表示優先）
# 余白: 上下左右 5mm
# 注: 9:20 は現在の主流。9:16 用に fallback する場合は汎用型を参照。
[PDF_android]
font = Yu Mincho  ; 推奨: 游明朝
font_size = 11pt
characters_per_line = 30
line_spacing = 1.0  ; baselineskip（1.7zh）で行送りを制御
android_width = 70      ; 標準スマートフォン幅
android_height = 155.5  ; 9:20 アスペクト比（70 * 20/9）

# ========================================
# PC用設定（A4・上下2段組推奨）
# ========================================
# ページ数: 表示（下端中央）
# 余白: 全周 10mm
[PDF_pc]
font = Yu Mincho
font_size = 12pt  ; A4用のバランス取れたサイズ
characters_per_line = 40  ; 標準的な雑誌・書籍の字詰め
line_spacing = 1.0  ; baselineskip（1.7zh）で行送りを制御
pc_width = 210    ; A4 幅
pc_height = 297   ; A4 高さ

# ========================================
# iPad 横向き（二段組）用設定【推奨】
# ========================================
# 画面寸法: 227.1mm x 157.8mm（見開き文庫本相当）
# 二段組で長時間読書に最適（眼球移動が短い）。
# ページ数: 表示（下端中央）
# 余白: 全周 10mm
[PDF_ipad_landscape]
font = Yu Mincho
font_size = 11pt  ; 二段組での字詰めを考慮
characters_per_line = 35
line_spacing = 1.0  ; baselineskip（1.7zh）で行送りを制御
ipad_landscape_width = 227   ; iPad 10th Gen実寸: 227.1mm
ipad_landscape_height = 158  ; iPad 10th Gen実寸: 157.8mm (回転)
; 使用: python aozoratex.py ... --device ipad_landscape

[PDF_ipad]
font = Yu Mincho
font_size = 12pt
characters_per_line = 35
line_spacing = 1.0  ; baselineskip（1.7zh）で行送りを制御
ipad_width = 158
ipad_height = 227
