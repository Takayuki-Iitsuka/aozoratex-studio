<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Scheme 一覧</title>
    <link rel="stylesheet" href="/static/docs/css/docs-common.css">
</head>

<body>
    <nav class="docs-topnav"><a href="/static/docs/index.html">← ドキュメント一覧に戻る</a></nav>
    <main class="page glass-panel">
        <h1 id="page-title">Color Scheme 一覧</h1>
        <p class="lead">
            Web画面で使っている配色データを一覧表示します。<br>
            検索・フィルタ・並び替えで好みの色を見つけやすいツールです。<br>
            「設定に反映」はアプリ本体の配色・フォントをその場で更新します（ページ移動はしません）。
        </p>

        <section class="toolbar">
            <div class="tool">
                <label for="search-filter">検索</label>
                <input id="search-filter" type="text" placeholder="色名 / HEX / カテゴリ">
            </div>
            <div class="tool">
                <label for="mode-filter">モード</label>
                <select id="mode-filter">
                    <option value="all">all</option>
                    <option value="light">light</option>
                    <option value="dark">dark</option>
                    <option value="intermediate">intermediate</option>
                    <option value="preset">preset</option>
                </select>
            </div>
            <div class="tool">
                <label for="sort-filter">並び順</label>
                <select id="sort-filter">
                    <option value="hue">色相順</option>
                    <option value="contrast">コントラスト順</option>
                    <option value="category">カテゴリ順</option>
                </select>
            </div>
            <div class="tool">
                <label for="font-filter">フォント</label>
                <select id="font-filter">
                    <option value="">読み込み中...</option>
                </select>
                <small class="meta-note">※ ★ は推奨フォント</small>
            </div>
            <div class="tool">
                <label for="font-refresh">フォント一覧</label>
                <button id="font-refresh" type="button">再取得</button>
                <small id="font-status" class="meta-note">LuaLaTeX確認中...</small>
            </div>
            <div class="tool">
                <label>テーマ</label>
                <div class="theme-switcher">
                    <label><input type="radio" name="theme" value="light" checked> Light</label>
                    <label><input type="radio" name="theme" value="dark"> Dark</label>
                    <label><input type="radio" name="theme" value="intermediate"> Intermediate</label>
                </div>
            </div>
            <div class="tool">
                <label for="background-filter">背景</label>
                <select id="background-filter">
                    <option value="none">なし</option>
                    <option value="noise">和紙（ノイズ）</option>
                </select>
                <small class="meta-note">画像は背景色の上に不透明度 0.18 で重なります（PDF出力と同じ挙動）</small>
            </div>
            <div class="tool">
                <label>表示件数</label>
                <span id="count" class="meta-note">読み込み中...</span>
            </div>
        </section>

        <section class="docs-grid" id="color-grid"></section>

        <p style="margin: 2rem 0; text-align: center;">
            <a href="/static/docs/index.html">← ドキュメント一覧に戻る</a>
        </p>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script src="/static/docs/js/colors.js"></script>
</body>

</html>
